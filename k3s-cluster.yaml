---
# K3s Cluster Environment
# Full Kubernetes cluster with storage, registry, monitoring, and Selenium infrastructure
# Usage: ansible-playbook k3s-cluster.yaml -i hosts.inv
# Resources: High (plan for 2GB+ per node)

# Compose the K3s profile from shared playbooks.
- name: Import shared Linux baseline
  import_playbook: playbooks/shared/linux_base.yaml
- name: Import shared K3s workload roles
  import_playbook: playbooks/shared/k3s_cluster_roles.yaml
