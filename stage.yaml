- hosts: stage_leader
  name: Configure stage leader
  become: true
  roles:
    - bashrc
    - swapoff
    - date
    - mem_count
    - print_boot_cmdline_txt
    - cgroup
    - fstab
    - sysctl_sdcard
    - log_ramdisk
    - network_tmpfs
    - apt_hardening
    - services_headless
    - fake_hwclock
    - boot_opts
    - apt_get
    - ssd_mount
    - k3s_leader
    - docker_registry

- hosts: stage_members
  name: Configure stage members
  become: true
  roles:
    - bashrc
    - swapoff
    - date
    - mem_count
    - print_boot_cmdline_txt
    - cgroup
    - fstab
    - sysctl_sdcard
    - log_ramdisk
    - network_tmpfs
    - apt_hardening
    - services_headless
    - fake_hwclock
    - boot_opts
    - apt_get
    - ssd_mount
    - k3s_member
