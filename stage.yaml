---
# Workload Profiles (choose one; always includes 'linux' base setup)
#
# AI Profile (low resource):
#   ansible-playbook stage.yaml -t ai
#   Installs: exo (distributed inference), open_webui (frontend), Docker
#   Resources: Modest memory and CPU, no cluster overhead
#   Good for: Lightweight inference on resource-constrained nodes
#
# Cluster Profile (high resource):
#   ansible-playbook stage.yaml -t k3s,storage,registry,monitoring,selenium
#   Installs: K3s, Longhorn storage, Docker registry, Prometheus, Selenium
#   Resources: Heavy memory and CPU (plan for 2GB+ per node)
#   Good for: Full cluster with orchestration and testing infrastructure
#
# Minimal Profile (baseline only):
#   ansible-playbook stage.yaml -t linux
#   Installs: System hardening, SSH keys, hostname, network config
#   Resources: Minimal
#   Good for: Fresh node setup before choosing AI or Cluster workload

- name: Configure stage leader
  hosts: stage_leader
  become: true
  roles:
    - role: board_detect
      tags: [always, linux]
    - role: sudoers
      tags: [linux, sudoers]
    - role: ssh_hostkeys
