# http://blog.scottlowe.org/2015/12/24/running-ansible-through-ssh-bastion-host/

[defaults]
host_key_checking = False
inventory=./hosts.inv
roles_path=./roles
remote_tmp=/tmp
remote_user=pi
become=true
become_method=sudo
interpreter_python=/usr/bin/python3
deprecation_warnings=False
timeout=60

[ssh_connection]
ssh_args = -F ssh.cfg
scp_if_ssh=true
retries=3
