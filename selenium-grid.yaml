---
# Selenium Grid Environment
# Browser automation and testing infrastructure
# Usage: ansible-playbook selenium-grid.yaml -i hosts.inv
# Resources: Medium (Docker + browser containers)

- name: Configure stage leader for Selenium Grid
  hosts: stage_leader
  become: true
  roles:
    # Base system setup (always included)
    - role: board_detect
      tags: [always, linux]
    - role: sudoers
      tags: [linux, sudoers]
    - role: ssh_hostkeys
      tags: [linux, ssh]
    - role: set_hostname
      tags: [linux]
    - role: bashrc
      tags: [linux]
    - role: mdns
      tags: [linux, mdns]
    - role: swapoff
      tags: [linux]
    - role: date
      tags: [linux]
    - role: mem_count
      tags: [linux, mem]
    - role: print_boot_cmdline_txt
      tags: [linux]
    - role: cgroup
      tags: [linux]
    - role: fstab
      tags: [linux]
    - role: sysctl_sdcard
      tags: [linux]
    - role: sysctl_k3s
      tags: [linux]
    - role: kernel_modules
      tags: [linux]
    - role: log_ramdisk
      tags: [linux, tmpfs]
    - role: network_tmpfs
      tags: [linux, tmpfs]
    - role: apt_hardening
      tags: [linux]
    - role: services_headless
      tags: [linux, headless]
    - role: fake_hwclock
      tags: [linux]
    - role: boot_opts
      tags: [linux]
    - role: apt_get
      tags: [linux]
    # Tools
    - role: iperf3
      tags: [tools]
    # Selenium testing infrastructure
    - role: selenium_media
      tags: [selenium]
    - role: selenium_grid
      tags: [selenium]

- name: Configure stage members for Selenium Grid
  hosts: stage_members
  become: true
  roles:
    # Base system setup (always included)
    - role: board_detect
      tags: [always, linux]
    - role: sudoers
      tags: [linux, sudoers]
    - role: ssh_hostkeys
      tags: [linux, ssh]
    - role: set_hostname
      tags: [linux]
    - role: bashrc
      tags: [linux]
    - role: mdns
      tags: [linux, mdns]
    - role: swapoff
      tags: [linux]
    - role: date
      tags: [linux]
    - role: mem_count
      tags: [linux, mem]
    - role: print_boot_cmdline_txt
      tags: [linux]
    - role: cgroup
      tags: [linux]
    - role: fstab
      tags: [linux]
    - role: sysctl_sdcard
      tags: [linux]
    - role: sysctl_k3s
      tags: [linux]
    - role: kernel_modules
      tags: [linux]
    - role: log_ramdisk
      tags: [linux, tmpfs]
    - role: network_tmpfs
      tags: [linux, tmpfs]
    - role: apt_hardening
      tags: [linux]
    - role: services_headless
      tags: [linux, headless]
    - role: fake_hwclock
      tags: [linux]
    - role: boot_opts
      tags: [linux]
    - role: apt_get
      tags: [linux]
    # Tools
    - role: iperf3
      tags: [tools]
    # Selenium testing infrastructure
    - role: selenium_media
      tags: [selenium]
    - role: selenium_grid
      tags: [selenium]
