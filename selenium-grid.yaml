---
# Selenium Grid Environment
# Browser automation and testing infrastructure
# Usage: ansible-playbook selenium-grid.yaml -i hosts.inv
# Resources: Medium (Docker + browser containers)

# Compose the Selenium profile from shared playbooks.
- name: Import shared Linux baseline
  import_playbook: playbooks/shared/linux_base.yaml
- name: Import shared Selenium prerequisites
  import_playbook: playbooks/shared/selenium_prereqs.yaml
- name: Import shared Selenium workload roles
  import_playbook: playbooks/shared/selenium_roles.yaml
