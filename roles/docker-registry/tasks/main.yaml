
- name: apt-get update
  ansible.builtin.shell:  apt-get update -y

- name: install Apache2-utils
  ansible.builtin.apt:
    name: apache2-utils
    state: present

- name: Remove useless packages from the cache
  ansible.builtin.apt:
    autoclean: yes

- name: Remove dependencies that are no longer required
  ansible.builtin.apt:
    autoremove: yes

- name: install pip
  ansible.builtin.apt:
    name: python3-pip
    state: present

- name: install python passlib
  ansible.builtin.pip:
    name: passlib
    state: present

- name: Add htpasswd
  community.general.htpasswd:
    state: present
    name: registry
    password: '1qazxsw2'
    path:  /home/pi/htpasswd
    mode: 0640

- name: Check if secret exists
  ansible.builtin.shell:  kubectl describe secret docker-registry-htpasswd
  register: secret_exists
  ignore_errors: yes

- name: kubectl create secret
  ansible.builtin.shell:  kubectl create secret generic docker-registry-htpasswd --from-file /home/pi/htpasswd
  register:  create_secret
  when:  secret_exists.rc == 1

- ansible.builtin.debug: msg="{{ create_secret.stdout_lines }}"
  when:  secret_exists.rc == 1

- name: kubectl describe secret
  ansible.builtin.shell:  kubectl describe secret docker-registry-htpasswd
  register: secrets
  when:  secret_exists.rc == 1

- ansible.builtin.debug: msg="{{ secrets.stdout_lines }}"
  when:  secret_exists.rc == 1

