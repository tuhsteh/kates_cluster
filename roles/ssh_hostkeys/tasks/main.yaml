---
# Step A — Regenerate host keys

- name: Remove existing SSH host keys
  ansible.builtin.shell:
    cmd: rm -f /etc/ssh/ssh_host_*
  changed_when: true

- name: Regenerate SSH host keys for all types
  ansible.builtin.command:
    cmd: ssh-keygen -A
  changed_when: true

- name: Restart SSH service
  ansible.builtin.service:
    name: ssh
    state: restarted

# Step B — Collect each node's public host key

- name: Read ed25519 public host key
  ansible.builtin.slurp:
    src: /etc/ssh/ssh_host_ed25519_key.pub
  register: ssh_hostkeys_ed25519_pub

- name: Expose ed25519 public host key content as fact
  ansible.builtin.set_fact:
    ssh_hostkeys_ed25519_pub_content: "{{ ssh_hostkeys_ed25519_pub.content | b64decode | trim }}"

# Step C — Build and deploy system-wide known_hosts

- name: Deploy system-wide known_hosts
  ansible.builtin.template:
    src: ssh_known_hosts.j2
    dest: /etc/ssh/ssh_known_hosts
    owner: root
    group: root
    mode: "0644"
