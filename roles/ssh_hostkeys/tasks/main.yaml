---
# Step A — Inspect host keys and regenerate only when needed

- name: Check for Ansible SSH host key marker
  ansible.builtin.stat:
    path: /etc/ssh/.ansible_hostkeys_generated
  register: ssh_hostkeys_marker

- name: Find existing SSH host key files
  ansible.builtin.find:
    paths: /etc/ssh
    patterns: ssh_host_*
    file_type: file
    recurse: false
  register: ssh_hostkeys_existing

- name: Capture SSH host key mtimes
  ansible.builtin.set_fact:
    ssh_hostkeys_mtimes: >-
      {{ ssh_hostkeys_existing.files | map(attribute='mtime') | map('int') | list }}

- name: Determine whether SSH host keys should be regenerated
  ansible.builtin.set_fact:
    ssh_hostkeys_should_regenerate: >-
      {{
        (not ssh_hostkeys_marker.stat.exists)
        and (
          (ssh_hostkeys_existing.matched | int == 0)
          or ((ssh_hostkeys_mtimes | unique | length) == 1)
        )
      }}

- name: Remove existing SSH host keys before regeneration
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ ssh_hostkeys_existing.files }}"
  when: ssh_hostkeys_should_regenerate
  register: ssh_hostkeys_removed

- name: Regenerate SSH host keys for all types
  ansible.builtin.command:
    cmd: ssh-keygen -A
  when: ssh_hostkeys_should_regenerate
  register: ssh_hostkeys_generated
  changed_when: true

- name: Record that Ansible generated SSH host keys
  ansible.builtin.file:
    path: /etc/ssh/.ansible_hostkeys_generated
    state: touch
    owner: root
    group: root
    mode: "0600"
  when: ssh_hostkeys_should_regenerate

- name: Restart SSH service
  ansible.builtin.service:
    name: ssh
    state: restarted
  when: ssh_hostkeys_should_regenerate

# Step B — Collect each node's public host key

- name: Read ed25519 public host key
  ansible.builtin.slurp:
    src: /etc/ssh/ssh_host_ed25519_key.pub
  register: ssh_hostkeys_ed25519_pub

- name: Expose ed25519 public host key content as fact
  ansible.builtin.set_fact:
    ssh_hostkeys_ed25519_pub_content: "{{ ssh_hostkeys_ed25519_pub.content | b64decode | trim }}"

# Step C — Build and deploy system-wide known_hosts

- name: Deploy system-wide known_hosts
  ansible.builtin.template:
    src: ssh_known_hosts.j2
    dest: /etc/ssh/ssh_known_hosts
    owner: root
    group: root
    mode: "0644"
