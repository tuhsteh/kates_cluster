---
# --- Raspberry Pi 4B (dphys-swapfile) ---
- name: Swapoff
  ansible.builtin.command: swapoff -a
  changed_when: false
  when: board_platform == 'pi4'

- name: Purge dphys-swapfile package
  ansible.builtin.apt:
    name: dphys-swapfile
    state: absent
    purge: true
  when: board_platform == 'pi4'

- name: Remove /var/swap file
  ansible.builtin.file:
    path: /var/swap
    state: absent
  when: board_platform == 'pi4'

# --- NanoPC T-4 ---
- name: No swap present on NanoPC-T4 (FriendlyElec Debian 13)
  ansible.builtin.debug:
    msg: >-
      FriendlyElec NanoPC-T4 has no swap configured (no zramswap service,
      no swap file). No action needed.
  when: board_platform == 'nanopc-t4'
