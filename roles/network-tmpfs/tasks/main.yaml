- name: check if dhcpcd is installed
  command: which dhcpcd
  register: dhcpcd_which
  failed_when: false
  changed_when: false

- name: mount /var/lib/dhcp as tmpfs
  ansible.posix.mount:
    path: /var/lib/dhcp
    src: tmpfs
    fstype: tmpfs
    opts: rw,noatime,nosuid,nodev,mode=0755,size=16m
    state: mounted
  when: dhcpcd_which.rc == 0
