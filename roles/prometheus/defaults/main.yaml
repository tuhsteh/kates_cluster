---
# Helm binary
prometheus_helm_version: "3.17.3"

# Chart
prometheus_chart_version: "83.5.0"
prometheus_namespace: "monitoring"
prometheus_release_name: "kube-prometheus-stack"

# NodePorts
prometheus_node_port: 30090
prometheus_alertmanager_node_port: 30093
prometheus_grafana_node_port: 30300

# Storage
prometheus_storage_size: "20Gi"
prometheus_storage_class: "longhorn"
prometheus_alertmanager_storage_size: "1Gi"
prometheus_grafana_storage_size: "1Gi"

# Retention
prometheus_retention: "15d"
prometheus_retention_size: "15GB"

# Credentials
# SECURITY: Override this via group_vars or host_vars using ansible-vault before deploying.
# Do not run with this default in any non-isolated environment.
prometheus_grafana_admin_password: "prom-operator"
