---
- name: Create monitoring namespace
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      kubectl create namespace {{ prometheus_namespace }} --dry-run=client -o yaml \
        | kubectl apply -f - --kubeconfig /etc/rancher/k3s/k3s.yaml
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: prometheus_ns_result
  changed_when: '"created" in prometheus_ns_result.stdout'

- name: Check installed Helm version
  ansible.builtin.command:
    cmd: helm version --short
  register: prometheus_helm_installed_version
  changed_when: false
  failed_when: false

- name: Download Helm tarball
  ansible.builtin.get_url:
    url: "https://get.helm.sh/helm-v{{ prometheus_helm_version }}-linux-arm64.tar.gz"
    dest: "/tmp/helm-v{{ prometheus_helm_version }}-linux-arm64.tar.gz"
    checksum: "sha256:https://get.helm.sh/helm-v{{ prometheus_helm_version }}-linux-arm64.tar.gz.sha256"
    mode: "0644"
  when: prometheus_helm_version not in (prometheus_helm_installed_version.stdout | default(''))

- name: Extract Helm binary
  ansible.builtin.unarchive:
    src: "/tmp/helm-v{{ prometheus_helm_version }}-linux-arm64.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    include:
      - linux-arm64/helm
    extra_opts:
      - "--strip-components=1"
  when: prometheus_helm_version not in (prometheus_helm_installed_version.stdout | default(''))

- name: Add prometheus-community Helm repo
  ansible.builtin.command:
    cmd: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: prometheus_repo_add
  changed_when: '"already exists" not in prometheus_repo_add.stdout'
  failed_when: prometheus_repo_add.rc != 0 and "already exists" not in prometheus_repo_add.stdout

- name: Update Helm repos
  ansible.builtin.command:
    cmd: helm repo update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Template kube-prometheus-stack values file
  ansible.builtin.template:
    src: values.yaml.j2
    dest: /tmp/kps-values.yaml
    owner: root
    group: root
    mode: "0600"

- name: Deploy kube-prometheus-stack via Helm
  ansible.builtin.command:
    cmd: >
      helm upgrade --install {{ prometheus_release_name }}
      prometheus-community/kube-prometheus-stack
      --namespace {{ prometheus_namespace }}
      --create-namespace
      --values /tmp/kps-values.yaml
      --wait
      --timeout 600s
      --kubeconfig /etc/rancher/k3s/k3s.yaml
      --version {{ prometheus_chart_version }}
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: prometheus_helm_deploy
  changed_when: >
    "has been installed" in prometheus_helm_deploy.stdout or
    "has been upgraded" in prometheus_helm_deploy.stdout

- name: Remove temporary Helm values file
  ansible.builtin.file:
    path: /tmp/kps-values.yaml
    state: absent

- name: Wait for Prometheus pod to be ready
  ansible.builtin.command:
    cmd: >
      kubectl wait --for=condition=ready pod
      -l app.kubernetes.io/name=prometheus
      -n {{ prometheus_namespace }}
      --timeout=300s
      --kubeconfig /etc/rancher/k3s/k3s.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
