- name: ensure k3s config directory exists
  file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: configure k3s kubelet container log rotation
  blockinfile:
    path: /etc/rancher/k3s/config.yaml
    marker: "# {mark} ANSIBLE MANAGED BLOCK - container log rotation"
    block: |
      kubelet-arg:
        - "container-log-max-size=10Mi"
        - "container-log-max-files=3"
    create: yes
    owner: root
    group: root
    mode: '0644'
