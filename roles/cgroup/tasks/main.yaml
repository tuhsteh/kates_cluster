- name: detect boot firmware path
  stat:
    path: /boot/firmware/cmdline.txt
  register: boot_firmware

- name: set cmdline_path fact
  set_fact:
    cmdline_path: "{{ '/boot/firmware/cmdline.txt' if boot_firmware.stat.exists else '/boot/cmdline.txt' }}"

- name: Activating cgroup support
  lineinfile:
    path: "{{ cmdline_path }}"
    backrefs: yes
    regexp: '^(console=serial0.+rootwait)$'
    line: '\1 cgroup_enable=cpuset cgroup_memory=1 cgroup_enable=memory'
  notify: reboot

- name: Flush iptables before changing to iptables-legacy
  iptables:
    flush: true
  changed_when: false

- name: Changing to iptables-legacy
  alternatives:
    path: /usr/sbin/iptables-legacy
    name: iptables
  register: ip4_legacy

- name: Changing to ip6tables-legacy
  alternatives:
    path: /usr/sbin/ip6tables-legacy
    name: ip6tables
  register: ip6_legacy
