---
# --- Raspberry Pi 4B path (cmdline.txt) ---
- name: Detect boot firmware path (Pi)
  ansible.builtin.stat:
    path: /boot/firmware/cmdline.txt
  register: cgroup_boot_firmware
  when: board_platform == 'pi4'

- name: Set cmdline_path fact (Pi)
  ansible.builtin.set_fact:
    cgroup_cmdline_path: "{{ '/boot/firmware/cmdline.txt' if cgroup_boot_firmware.stat.exists else '/boot/cmdline.txt' }}"
  when: board_platform == 'pi4'

- name: Activating cgroup support (Pi)
  ansible.builtin.lineinfile:
    path: "{{ cgroup_cmdline_path }}"
    backrefs: true
    regexp: '^((?!.*cgroup_enable=memory).+rootwait.*)$'
    line: '\1 cgroup_enable=cpuset cgroup_memory=1 cgroup_enable=memory'
  when: board_platform == 'pi4'
  notify: Reboot

# --- NanoPC T-4 ---
- name: Cgroup flags pre-compiled in FriendlyElec kernel (NanoPC)
  ansible.builtin.debug:
    msg: >-
      [INFO] Kernel 6.6 boots cgroup v2 (unified hierarchy) by default on this node.
      cpuset and CPU limits are fully available via cgroup v2 — no cmdline flags required.
      The v1 cmdline flags (cgroup_enable=*, cgroup_memory=*) are no longer relevant.
      Verify: run 'stat -fc %T /sys/fs/cgroup/' on the node — expected output: cgroup2fs.
  when: board_platform == 'nanopc-t4'

# --- Both boards (iptables) ---
- name: Install iptables package
  ansible.builtin.apt:
    name: iptables
    state: present
    update_cache: false

- name: Flush iptables before changing to iptables-legacy
  ansible.builtin.iptables:
    flush: true
  changed_when: false

- name: Changing to iptables-legacy
  community.general.alternatives:
    path: /usr/sbin/iptables-legacy
    name: iptables
  register: cgroup_ip4_legacy

- name: Changing to ip6tables-legacy
  community.general.alternatives:
    path: /usr/sbin/ip6tables-legacy
    name: ip6tables
  register: cgroup_ip6_legacy
