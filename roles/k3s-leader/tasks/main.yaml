---
- name: Create k3s data directory on SSD
  ansible.builtin.file:
    path: "{{ k3s_data_dir }}"
    state: directory
    mode: "0700"
    owner: root
    group: root
  when: (ansible_mounts | selectattr('mount', 'equalto', '/mnt/ssd') | list | length) > 0

- name: Ensure k3s systemd drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/k3s.service.d
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Add SSD mount dependency to k3s service
  ansible.builtin.copy:
    dest: /etc/systemd/system/k3s.service.d/override.conf
    content: |
      [Unit]
      After=mnt-ssd.mount
      Requires=mnt-ssd.mount
    mode: "0644"
    owner: root
    group: root
  notify: Reload systemd

- name: Ensure k3s config directory exists
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Write k3s server config
  ansible.builtin.template:
    src: k3s-server-config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    owner: root
    group: root
    mode: '0644'
  notify: restart k3s

- name: Install k3s server
  ansible.builtin.shell:
    cmd: curl -sfL https://get.k3s.io | sh -
    creates: /usr/local/bin/k3s

- name: Enable and start k3s service
  ansible.builtin.service:
    name: k3s
    state: started
    enabled: true

- name: Flush handlers before waiting for cluster readiness
  ansible.builtin.meta: flush_handlers

- name: Wait for k3s token file
  ansible.builtin.wait_for:
    path: "{{ k3s_data_dir }}/server/token"
    timeout: 120

- name: Read node token from leader
  ansible.builtin.slurp:
    src: "{{ k3s_data_dir }}/server/token"
  register: k3s_token_raw
  no_log: true

- name: Set node token fact
  ansible.builtin.set_fact:
    k3s_node_token: "{{ k3s_token_raw.content | b64decode | regex_replace('\n', '') }}"
  no_log: true

- name: Wait for k3s API to be available
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: 6443
    timeout: 120

- name: Check if local kubeconfig already exists
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/.kube/k3s-kate.yaml"
  register: _kubeconfig_stat
  delegate_to: localhost
  become: false

- name: Ensure local .kube directory exists
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.kube"
    state: directory
    mode: '0700'
  delegate_to: localhost
  become: false

- name: Fetch kubeconfig from leader
  ansible.builtin.fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /tmp/k3s-kate.yaml
    flat: true
  no_log: true
  when: not _kubeconfig_stat.stat.exists

- name: Rewrite kubeconfig server address to external hostname
  ansible.builtin.replace:
    path: /tmp/k3s-kate.yaml
    regexp: 'https://127\.0\.0\.1:6443'
    replace: 'https://kate0.local:6443'
  delegate_to: localhost
  become: false
  when: not _kubeconfig_stat.stat.exists

- name: Copy kubeconfig to local .kube directory
  ansible.builtin.copy:
    src: /tmp/k3s-kate.yaml
    dest: "{{ lookup('env', 'HOME') }}/.kube/k3s-kate.yaml"
    mode: '0600'
  delegate_to: localhost
  become: false
  no_log: true
  when: not _kubeconfig_stat.stat.exists

- name: Remove temporary kubeconfig
  ansible.builtin.file:
    path: /tmp/k3s-kate.yaml
    state: absent
  delegate_to: localhost
  become: false
  when: not _kubeconfig_stat.stat.exists
