---
# --- Raspberry Pi 4B path ---
- name: Detect boot firmware path (Pi)
  ansible.builtin.stat:
    path: /boot/firmware/cmdline.txt
  register: boot_opts_boot_firmware
  when: board_platform == 'pi4'

- name: Set cmdline_path fact (Pi)
  ansible.builtin.set_fact:
    boot_opts_cmdline_path: "{{ '/boot/firmware/cmdline.txt' if boot_opts_boot_firmware.stat.exists else '/boot/cmdline.txt' }}"
  when: board_platform == 'pi4'

- name: Add fsck.mode=skip to cmdline.txt (Pi)
  ansible.builtin.lineinfile:
    path: "{{ boot_opts_cmdline_path }}"
    backrefs: true
    regexp: '^((?!.*fsck\.mode=skip).+rootwait.*)$'
    line: '\1 fsck.mode=skip'
  when: board_platform == 'pi4'
  notify: Reboot

# --- NanoPC T-4 ---
- name: Boot parameters cannot be modified via Ansible on FriendlyElec Debian 13 (NanoPC)
  ansible.builtin.debug:
    msg: >-
      FriendlyElec NanoPC-T4 uses raw-partition Rockchip boot — no extlinux.conf
      exists and no armbianEnv.txt is present. The kernel cmdline is compiled into
      the firmware. Boot parameters such as fsck.mode=skip cannot be applied via
      Ansible on this image. No action taken.
  when: board_platform == 'nanopc-t4'
