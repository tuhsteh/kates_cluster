
- name: mount /var/log as tmpfs ramdisk
  mount:
    path: /var/log
    src: tmpfs
    fstype: tmpfs
    opts: "rw,noatime,nosuid,mode=0755,size={{ '256m' if inventory_hostname in groups['stage_leader'] else '100m' }}"
    state: mounted

- name: configure journald volatile storage
  lineinfile:
    path: /etc/systemd/journald.conf
    regexp: '^#?Storage='
    line: 'Storage=volatile'
  notify: restart journald
