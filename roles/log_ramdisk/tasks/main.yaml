
- name: mount /var/log as tmpfs ramdisk
  ansible.posix.mount:
    path: /var/log
    src: tmpfs
    fstype: tmpfs
    opts: "rw,noatime,nosuid,mode=0755,size={{ '256m' if inventory_hostname in groups['stage_leader'] else '100m' }}"
    state: mounted

- name: configure journald volatile storage
  ansible.builtin.lineinfile:
    path: /etc/systemd/journald.conf
    regexp: '^#?Storage='
    line: 'Storage=volatile'
  notify: restart journald

- name: configure journald RuntimeMaxUse
  ansible.builtin.lineinfile:
    path: /etc/systemd/journald.conf
    regexp: '^#?RuntimeMaxUse='
    line: 'RuntimeMaxUse=64M'
  notify: restart journald

- name: configure journald RuntimeMaxFileSize
  ansible.builtin.lineinfile:
    path: /etc/systemd/journald.conf
    regexp: '^#?RuntimeMaxFileSize='
    line: 'RuntimeMaxFileSize=16M'
  notify: restart journald

- name: configure journald ForwardToSyslog
  ansible.builtin.lineinfile:
    path: /etc/systemd/journald.conf
    regexp: '^#?ForwardToSyslog='
    line: 'ForwardToSyslog=no'
  notify: restart journald
