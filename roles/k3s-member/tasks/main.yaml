---
- name: Create k3s data directory on SSD
  ansible.builtin.file:
    path: "{{ k3s_data_dir }}"
    state: directory
    mode: "0700"
    owner: root
    group: root
  when: (ansible_mounts | selectattr('mount', 'equalto', '/mnt/ssd') | list | length) > 0

- name: Ensure k3s-agent systemd drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/k3s-agent.service.d
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Add SSD mount dependency to k3s-agent service
  ansible.builtin.copy:
    dest: /etc/systemd/system/k3s-agent.service.d/override.conf
    content: |
      [Unit]
      After=mnt-ssd.mount
      Requires=mnt-ssd.mount
    mode: "0644"
    owner: root
    group: root
  notify: Reload systemd

- name: ensure k3s config directory exists
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: write k3s agent config
  ansible.builtin.template:
    src: k3s-agent-config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    owner: root
    group: root
    mode: '0644'
  notify: restart k3s-agent

- name: fetch node token from leader when not already in memory
  ansible.builtin.slurp:
    src: "{{ k3s_data_dir }}/server/token"
  register: _k3s_token_raw
  delegate_to: "{{ groups['stage_leader'][0] }}"
  no_log: true
  when: hostvars[groups['stage_leader'][0]].k3s_node_token is not defined

- name: set node token fact
  ansible.builtin.set_fact:
    k3s_node_token: >-
      {{ hostvars[groups['stage_leader'][0]].k3s_node_token
         if hostvars[groups['stage_leader'][0]].k3s_node_token is defined
         else (_k3s_token_raw.content | b64decode | regex_replace('\n', '')) }}
  no_log: true

- name: check if k3s-agent is already installed
  ansible.builtin.stat:
    path: /etc/systemd/system/k3s-agent.service
  register: _k3s_agent_service

- name: wait for k3s API server to be reachable
  ansible.builtin.wait_for:
    host: "{{ groups['stage_leader'][0] }}"
    port: 6443
    timeout: 120
  when: not _k3s_agent_service.stat.exists

- name: install k3s agent
  ansible.builtin.shell:
    cmd: curl -sfL https://get.k3s.io | sh -
    creates: /etc/systemd/system/k3s-agent.service
  environment:
    K3S_URL: "https://{{ groups['stage_leader'][0] }}:6443"
    K3S_TOKEN: "{{ k3s_node_token }}"
  no_log: true

- name: enable and start k3s-agent service
  ansible.builtin.service:
    name: k3s-agent
    state: started
    enabled: true
