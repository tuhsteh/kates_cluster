- name: mask apt-daily timer
  systemd:
    name: apt-daily.timer
    masked: yes
    state: stopped
  ignore_errors: yes

- name: mask apt-daily-upgrade timer
  systemd:
    name: apt-daily-upgrade.timer
    masked: yes
    state: stopped
  ignore_errors: yes

- name: remove unattended-upgrades
  apt:
    name: unattended-upgrades
    state: absent
    purge: yes
