# inotify — prevent CrashLoopBackOff from hitting file watch limits
fs.inotify.max_user_instances = 8192
fs.inotify.max_user_watches   = 524288

# bridge netfilter — required for pod-to-pod networking and NetworkPolicy
# (br_netfilter module must be loaded before these are active)
net.bridge.bridge-nf-call-iptables  = 1
net.bridge.bridge-nf-call-ip6tables = 1
net.ipv4.ip_forward                 = 1

# memory overcommit — Kubernetes requires this
vm.overcommit_memory = 1

# conntrack — increase table size for busy cluster with many services/pods
net.netfilter.nf_conntrack_max                     = 131072
net.netfilter.nf_conntrack_tcp_timeout_established = 86400
net.netfilter.nf_conntrack_tcp_timeout_time_wait   = 120

# panic recovery — auto-reboot on kernel panic rather than hanging
kernel.panic      = 10
kernel.panic_on_oops = 1
