# Exo AI Environment
# Lightweight distributed inference with exo and open-webui frontend
# Usage: ansible-playbook exo-ai.yaml -i hosts.inv
# Resources: Low (no K3s cluster overhead)

# Compose the AI profile from shared playbooks.
- name: Import shared Linux baseline
  import_playbook: playbooks/shared/linux_base.yaml
- name: Import shared AI workload roles
  import_playbook: playbooks/shared/ai_roles.yaml
