---
# Exo AI Environment
# Lightweight distributed inference with exo and open-webui frontend
# Usage: ansible-playbook exo-ai.yaml -i hosts.inv
# Resources: Low (no K3s cluster overhead)

- name: Configure stage leader for AI workload
  hosts: stage_leader
  become: true
  roles:
    # Base system setup (always included)
    - role: board_detect
      tags: [always, linux]
    - role: sudoers
      tags: [linux]
    - role: ssh_hostkeys
      tags: [linux, ssh]
    - role: set_hostname
      tags: [linux]
    - role: bashrc
      tags: [linux]
    - role: mdns
      tags: [linux]
    - role: swapoff
      tags: [linux]
    - role: date
      tags: [linux]
    - role: mem_count
      tags: [linux, mem]
    - role: print_boot_cmdline_txt
      tags: [linux]
    - role: cgroup
      tags: [linux]
    - role: fstab
      tags: [linux]
    - role: sysctl_sdcard
      tags: [linux]
    - role: sysctl_k3s
      tags: [linux]
    - role: kernel_modules
      tags: [linux]
    - role: log_ramdisk
      tags: [linux]
    - role: network_tmpfs
      tags: [linux, tmpfs]
    - role: apt_hardening
      tags: [linux]
    - role: services_headless
      tags: [linux]
    - role: fake_hwclock
      tags: [linux]
    - role: boot_opts
      tags: [linux]
    - role: apt_get
      tags: [linux]
    # Tools
    - role: iperf3
      tags: [tools]
    # AI workload
    - role: exo
      tags: [ai]
    - role: open_webui
      tags: [ai]

- name: Configure stage members for AI workload
  hosts: stage_members
  become: true
  roles:
    # Base system setup (always included)
    - role: board_detect
      tags: [always, linux]
    - role: sudoers
      tags: [linux]
    - role: ssh_hostkeys
      tags: [linux, ssh]
    - role: set_hostname
      tags: [linux]
    - role: bashrc
      tags: [linux]
    - role: mdns
      tags: [linux]
    - role: swapoff
      tags: [linux]
    - role: date
      tags: [linux]
    - role: mem_count
      tags: [linux, mem]
    - role: print_boot_cmdline_txt
      tags: [linux]
    - role: cgroup
      tags: [linux]
    - role: fstab
      tags: [linux]
    - role: sysctl_sdcard
      tags: [linux]
    - role: sysctl_k3s
      tags: [linux]
    - role: kernel_modules
      tags: [linux]
    - role: log_ramdisk
      tags: [linux]
    - role: network_tmpfs
      tags: [linux, tmpfs]
    - role: apt_hardening
      tags: [linux]
    - role: services_headless
      tags: [linux]
    - role: fake_hwclock
      tags: [linux]
    - role: boot_opts
      tags: [linux]
    - role: apt_get
      tags: [linux]
    # Tools
    - role: iperf3
      tags: [tools]
    # AI workload
    - role: exo
      tags: [ai]
