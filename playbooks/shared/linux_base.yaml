# Shared Linux baseline for stage leader and stage members

- name: Configure stage leader (Linux baseline)
  hosts: stage_leader
  become: true
  roles:
    - role: board_detect
      tags: [always, linux]
    - role: sudoers
      tags: [linux, sudoers]
    - role: ssh_hostkeys
      tags: [linux, ssh]
    - role: set_hostname
      tags: [linux]
    - role: bashrc
      tags: [linux]
    - role: mdns
      tags: [linux, mdns]
    - role: swapoff
      tags: [linux]
    - role: date
      tags: [linux]
    - role: mem_count
      tags: [linux, mem]
    - role: print_boot_cmdline_txt
      tags: [linux]
    - role: cgroup
      tags: [linux]
    - role: fstab
      tags: [linux]
    - role: sysctl_sdcard
      tags: [linux]
    - role: sysctl_k3s
      tags: [linux]
    - role: kernel_modules
      tags: [linux]
    - role: log_ramdisk
      tags: [linux, tmpfs]
    - role: network_tmpfs
      tags: [linux, tmpfs]
    - role: apt_hardening
      tags: [linux]
    - role: services_headless
      tags: [linux, headless]
    - role: fake_hwclock
      tags: [linux]
    - role: boot_opts
      tags: [linux]
    - role: apt_get
      tags: [linux]
    - role: iperf3
      tags: [tools]

